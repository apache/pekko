# Raise minimum-runnable so the ForkJoinPool keeps enough threads active on JDK 21+,
# where the asyncMode (FIFO) compensation-thread regression (JDK-8300995 / JDK-8321335)
# can otherwise stall the stream dispatcher long enough to time out property-based tests.
# Value 8 matches the nightly-CI override applied for JDK >= 21 and is safe on older JDKs
# (compensation threads are only created when dispatcher threads actually block, which
# does not happen in these tests).
pekko.test.stream-dispatcher.fork-join-executor {
  minimum-runnable = 8
}
