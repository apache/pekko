name: Remote Test

on:
  workflow_dispatch:
  pull_request:

permissions: {}

concurrency:
  # Only run once for latest commit per ref and cancel other (previous) runs.
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  remote-test:
    name: Check / Tests
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        scalaVersion: ["2.13.x"]
        checkoutRef: ["v2.0.0-M2", "v2.0.0-M3", "x2.0.0-M4-RC0"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
        with:
          # we don't know what commit the last tag was it's safer to get entire repo so previousStableVersion resolves
          fetch-depth: 0
          fetch-tags: 0
          persist-credentials: false
          ref: ${{ matrix.checkoutRef }}

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Install sbt
        uses: sbt/setup-sbt@af116cce31c00823d3903ce687f9cda3a4f19f1b # v1.2.1

      - name: Cache Coursier cache
        uses: coursier/cache-action@95e5b1029b6b86e7bac033ee44a0697d8a527d2d # 8.1.1

      - name: Enable jvm-opts
        run: cp .jvmopts-ci .jvmopts

      - name: sbt remote/test
        run: |-
          sbt \
          -Dpekko.mima.enabled=false \
          -Dpekko.test.multi-in-test=false \
          -Dpekko.test.timefactor=2 \
          -Dpekko.actor.testkit.typed.timefactor=2 \
          -Dpekko.test.tags.exclude=gh-exclude,timing \
          -Dpekko.cluster.assert=on \
          -Dsbt.override.build.repos=false \
          -Dpekko.test.multi-node=false \
          -Dsbt.log.noformat=false \
          -Dpekko.log.timestamps=true \
          "++ ${{ matrix.scalaVersion }} remote/test"
